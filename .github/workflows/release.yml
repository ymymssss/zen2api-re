name: Release

on:
  push:
    tags: ["v*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64,   suffix: linux-amd64 }
          - { goos: linux,   goarch: arm64,   suffix: linux-arm64 }
          - { goos: linux,   goarch: arm,     suffix: linux-armv7 }
          - { goos: darwin,  goarch: amd64,   suffix: darwin-amd64 }
          - { goos: darwin,  goarch: arm64,   suffix: darwin-arm64 }
          - { goos: windows, goarch: amd64,   suffix: windows-amd64.exe }
          - { goos: android, goarch: arm64,   suffix: android-arm64 }
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: false

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        go build -v -ldflags="-s -w" -o zen2api-${{ matrix.suffix }} .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: zen2api-${{ matrix.suffix }}
        path: zen2api-${{ matrix.suffix }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/zen2api-*
        generate_release_notes: true
